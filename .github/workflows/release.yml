# Release pipeline: build per-platform binaries + multi-arch container images, smoke-test each artifact,
# and publish ONLY after the smoke test passes — then sign and attest an SBOM for the published images.
#
#   - on a `v*` tag push: build -> smoke -> publish (GitHub Release assets + signed multi-arch GHCR images).
#   - on workflow_dispatch (any branch): build -> smoke only (every publish/sign step is gated on a `v*`
#     tag), so the whole pipeline — including the arm64 leg — can be dry-run without cutting a release.
#
# Conventions (see docs/ci.md): every third-party action is pinned to a full commit SHA, permissions
# are least-privilege per job, and no layer/dependency cache is used — a release build is cold by
# design so a poisoned cache can never taint a published artifact (zizmor `cache-poisoning`).
#
# Images (GP3): two repos, both multi-arch (linux/amd64 + linux/arm64), built NATIVELY per arch (no
# cross-compile / no QEMU) so the bits that ship are the bits that were smoked on that arch:
#   - ghcr.io/sondrateconsulting/jitgen       — fat "container IS the sandbox" CI image (all toolchains)
#   - ghcr.io/sondrateconsulting/jitgen-demo  — slim demo-only image (`jitgen demo`, sh substrate only)
# Each arch image is built, smoked, and pushed by digest; `publish-images` assembles the manifest lists
# from those exact digests, signs them keyless (cosign + OIDC), and attaches an SBOM attestation.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Least privilege at the top; each job widens only what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-publish

env:
  # The two image repos, referenced by build-images and publish-images.
  FAT_IMAGE: ghcr.io/sondrateconsulting/jitgen
  SLIM_IMAGE: ghcr.io/sondrateconsulting/jitgen-demo

jobs:
  # Native build per runner — no cross-compilation. The C-heavy deps (vendored libgit2, static zlib,
  # bundled rusqlite, tree-sitter grammars, ring) are fiddly to cross-compile, so each target builds on
  # its own host. (linux/arm64 binary needs an arm runner and is a documented follow-up; see docs/ci.md.)
  build-binaries:
    name: binary (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          # Intel macOS (x86_64-apple-darwin) is intentionally not built: GitHub's macos-13 Intel
          # runners are queue-constrained and on a deprecation path. Intel-mac users build from source
          # or use the container image. (See docs/ci.md.)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build release binary (native target)
        # rust-toolchain.toml pins 1.95.0; the runner's rustup installs it on first use. No --target:
        # the host IS the matrix target, so this is a native build.
        run: cargo build --locked --release --bin jitgen -p jitgen-cli
      - name: Smoke test the binary BEFORE packaging
        run: bash .github/scripts/smoke.sh target/release/jitgen
      - name: Package tarball + SHA256 checksum
        id: package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME//\//-}"          # sanitize slashes from dispatch branch refs
          name="jitgen-${ver}-${TARGET}"
          # Stage the binary plus pre-generated shell completions, so a tarball user gets completions
          # without running the subcommand themselves. Generated from the just-built, just-smoked binary
          # so the scripts always match this release's live flag surface (build_command(), version included).
          stage="$(mktemp -d)"
          cp target/release/jitgen "${stage}/jitgen"
          mkdir -p "${stage}/completions"
          for sh in bash zsh fish; do
            ./target/release/jitgen completions "${sh}" > "${stage}/completions/jitgen.${sh}"
          done
          mkdir -p dist
          tar -czf "dist/${name}.tar.gz" -C "${stage}" jitgen completions
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          echo "artifact=${name}" >> "$GITHUB_OUTPUT"
      - name: Verify the tarball ships the binary + completions
        shell: bash
        env:
          ARTIFACT: ${{ steps.package.outputs.artifact }}
        run: |
          set -euo pipefail
          # Extract into a clean dir and assert the expected layout, so a packaging regression fails the
          # release build instead of shipping an incomplete tarball.
          check="$(mktemp -d)"
          tar -xzf "dist/${ARTIFACT}.tar.gz" -C "${check}"
          for f in jitgen completions/jitgen.bash completions/jitgen.zsh completions/jitgen.fish; do
            test -s "${check}/${f}" || { echo "::error::tarball missing ${f}"; exit 1; }
          done
          echo "tarball layout OK: jitgen + completions/jitgen.{bash,zsh,fish}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # Build BOTH images (fat runtime + slim demo) NATIVELY on each arch, smoke each, then (on a tag) push
  # each per-arch image by digest. arm64 uses GitHub's hosted `ubuntu-24.04-arm` runner (available on
  # private repos on all plans since 2026-01-29). The published per-arch digests are recorded as
  # artifacts so publish-images assembles the manifest lists from the EXACT bits that passed smoke.
  build-images:
    name: image (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-24.04
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write # push per-arch images to GHCR — only exercised on a v* tag
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build the fat (runtime) image ONCE — loaded into the local daemon, not pushed
        run: docker build --target runtime -t jitgen-fat:smoke .
      - name: Smoke the fat image BEFORE publish
        run: |
          set -euo pipefail
          docker run --rm jitgen-fat:smoke --version
          docker run --rm jitgen-fat:smoke doctor
          # The fat image's reason to exist is the bundled toolchains — assert each is present + runnable,
          # so a toolchain that silently breaks (e.g. a future base-digest bump) fails smoke, not CI.
          docker run --rm --entrypoint sh jitgen-fat:smoke -c '
            set -e
            git --version; cargo --version; rustc --version
            node --version; npm --version
            java -version; mvn --version
            python3 --version; pytest --version'
          # Build the analyze fixture inside the container (non-root), proving jitgen runs end to end.
          docker run --rm -i --entrypoint bash jitgen-fat:smoke -s jitgen < .github/scripts/smoke.sh

      - name: Build the slim (demo) image ONCE — loaded into the local daemon, not pushed
        run: docker build --target demo -t jitgen-demo:smoke .
      - name: Smoke the slim image BEFORE publish
        run: |
          set -euo pipefail
          # 1. The binary loads and prints its version + data-contract.
          docker run --rm jitgen-demo:smoke --version | grep -q 'data-contract'
          # 2. `docker run <slim>` (no args -> CMD demo) runs the offline real-catch demo to completion:
          #    exit 0 AND the success line. This exercises the FULL constrained-local sandbox path inside
          #    the slim image — the exact path the dash-exec P0 fix repaired on Debian/dash Linux.
          set +e
          out="$(docker run --rm jitgen-demo:smoke)"
          demo_rc=$?
          set -e
          echo "$out"
          [ "$demo_rc" -eq 0 ] \
            || { echo "::error::slim demo exited ${demo_rc} (expected 0)"; exit 1; }
          echo "$out" | grep -q '\[ok\] jitgen caught the seeded regression' \
            || { echo "::error::slim demo did not report a catch"; exit 1; }
          echo "$out" | grep -q 'StrongCatch' \
            || { echo "::error::slim demo verdict was not StrongCatch"; exit 1; }
          # 3. `--lang rust` is unsupported in the slim image (no cargo) and must fail FAST with the
          #    documented, actionable pointer to the default demo — not a confusing deep failure.
          set +e
          rust_out="$(docker run --rm jitgen-demo:smoke demo --lang rust 2>&1)"
          rust_rc=$?
          set -e
          echo "$rust_out"
          [ "$rust_rc" -ne 0 ] \
            || { echo "::error::slim demo --lang rust unexpectedly succeeded (no cargo in the slim image)"; exit 1; }
          echo "$rust_out" | grep -q 'needs a local rust toolchain' \
            || { echo "::error::slim demo --lang rust failure message was not the documented one"; exit 1; }

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the SMOKED per-arch images by digest (the exact bits that passed smoke)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ARCH: ${{ matrix.arch }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p digests
          # Tag + push the SAME local image that was just smoked — NOT a second build — then record the
          # registry digest, so publish-images can assemble the manifest list from exact digests.
          push_one() {
            local kind="$1" image="$2" local_tag="$3" digest
            docker tag "${local_tag}" "${image}:${REF}-${ARCH}"
            docker push "${image}:${REF}-${ARCH}"
            digest="$(docker buildx imagetools inspect "${image}:${REF}-${ARCH}" --format '{{.Manifest.Digest}}')"
            echo "${digest}" > "digests/${kind}-${ARCH}.digest"
            echo "pushed ${image}:${REF}-${ARCH} @ ${digest}"
          }
          push_one fat  "${FAT_IMAGE}"  jitgen-fat:smoke
          push_one slim "${SLIM_IMAGE}" jitgen-demo:smoke

      - name: Upload per-arch image digests for the manifest assembler
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-digests-${{ matrix.arch }}
          path: digests/
          if-no-files-found: error
          retention-days: 7

  # Assemble the multi-arch manifest lists from the exact per-arch digests that passed smoke, sign them
  # keyless (cosign + GitHub OIDC, no long-lived key), and attach an SPDX SBOM attestation to each. Only
  # runs on a v* tag (on workflow_dispatch this whole job is skipped — the dry-run is build + smoke).
  publish-images:
    name: sign + publish multi-arch images
    needs: build-images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write # assemble + push manifest lists, push signatures + attestations
      id-token: write # cosign keyless signing via the GitHub OIDC token
    env:
      REF: ${{ github.ref_name }}
      # Single source for the pinned cosign CLI version — used by the installer input AND the
      # post-install assertion below.
      COSIGN_PIN: v2.6.3
    steps:
      - name: Download the per-arch image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: image-digests-*
          path: digests
          merge-multiple: true
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign CLI to the latest v2 release. The v4 installer defaults to cosign v3,
          # which removes `attest --tlog-upload` and flips --new-bundle-format /
          # --use-signing-config on by default for BOTH sign and attest — that changes where and
          # how signatures are stored, which would break the attest step below AND the documented
          # verify commands in docs/ci.md. Migrating to cosign v3 is a deliberate follow-up that
          # must re-validate the whole sign/attest/verify flow, not a drive-by installer bump.
          cosign-release: ${{ env.COSIGN_PIN }}
      - name: Fail loud if the installed cosign is not the pinned version
        run: |
          set -euo pipefail
          # The cosign-release input is the only thing holding this workflow on the cosign v2 CLI,
          # and GitHub Actions silently IGNORES unknown `with:` keys — so a future installer major
          # that renames the input would silently install its (v3) default. Catch that here, at
          # install time, instead of as a sign/attest breakage mid-release.
          installed="$(cosign version --json | jq -r .gitVersion)"
          [ "$installed" = "$COSIGN_PIN" ] \
            || { echo "::error::cosign version drift: expected ${COSIGN_PIN}, got '${installed}' — was the installer's cosign-release input renamed?"; exit 1; }

      - name: Assemble + push the multi-arch manifest lists from the smoked per-arch digests
        shell: bash
        run: |
          set -euo pipefail
          # Read each per-arch digest by filename regardless of how the artifact download nested it, and
          # fail loud if any is missing or not a sha256 digest. This job is tag-gated, so it is first
          # exercised on the real release — a silent bad read must hard-fail here, never half-publish.
          declare -A DG
          for kind in fat slim; do
            for arch in amd64 arm64; do
              f="$(find digests -type f -name "${kind}-${arch}.digest" | head -1)"
              [ -n "$f" ] || { echo "::error::digest file ${kind}-${arch}.digest not found among downloaded artifacts"; exit 1; }
              v="$(tr -d '[:space:]' < "$f")"
              # Require a COMPLETE digest (sha256: + 64 hex), not just the prefix, so a truncated/
              # half-read value is rejected here rather than flowing into imagetools create.
              [[ "$v" =~ ^sha256:[0-9a-f]{64}$ ]] \
                || { echo "::error::${kind}-${arch}.digest is not a well-formed sha256 digest: '${v}'"; exit 1; }
              DG["${kind}-${arch}"]="$v"
            done
          done
          fat_amd="${DG[fat-amd64]}";  fat_arm="${DG[fat-arm64]}"
          slim_amd="${DG[slim-amd64]}"; slim_arm="${DG[slim-arm64]}"
          # imagetools create references the children by DIGEST, so the published index is provably the
          # exact per-arch bits that passed smoke (no tag races, no rebuild).
          docker buildx imagetools create \
            -t "${FAT_IMAGE}:${REF}" -t "${FAT_IMAGE}:latest" \
            "${FAT_IMAGE}@${fat_amd}" "${FAT_IMAGE}@${fat_arm}"
          docker buildx imagetools create \
            -t "${SLIM_IMAGE}:${REF}" -t "${SLIM_IMAGE}:latest" \
            "${SLIM_IMAGE}@${slim_amd}" "${SLIM_IMAGE}@${slim_arm}"
          fat_digest="$(docker buildx imagetools inspect "${FAT_IMAGE}:${REF}" --format '{{.Manifest.Digest}}')"
          slim_digest="$(docker buildx imagetools inspect "${SLIM_IMAGE}:${REF}" --format '{{.Manifest.Digest}}')"
          # Guard the assembled manifest-list digests with the same well-formed sha256 check the per-arch
          # read uses above (full sha256: + 64 hex, not just the prefix): set -e already aborts an inspect
          # that errors outright, but sign + SBOM-attest must never target a malformed/half-read digest, so
          # reject anything that is not a complete sha256 digest before it reaches $GITHUB_ENV / signing.
          [[ "$fat_digest"  =~ ^sha256:[0-9a-f]{64}$ ]] \
            || { echo "::error::fat manifest-list digest is not a well-formed sha256 digest: '${fat_digest}'";  exit 1; }
          [[ "$slim_digest" =~ ^sha256:[0-9a-f]{64}$ ]] \
            || { echo "::error::slim manifest-list digest is not a well-formed sha256 digest: '${slim_digest}'"; exit 1; }
          echo "FAT_DIGEST=${fat_digest}"   >> "$GITHUB_ENV"
          echo "SLIM_DIGEST=${slim_digest}" >> "$GITHUB_ENV"
          echo "Published ${FAT_IMAGE}@${fat_digest}"
          echo "Published ${SLIM_IMAGE}@${slim_digest}"

      - name: Sign the manifest-list digests (cosign keyless, recursive over the arch children)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          # --recursive signs the index AND each per-arch child manifest, so `cosign verify` succeeds
          # against the multi-arch tag and against a pinned per-arch digest alike. (Signatures only —
          # the SBOM attestation below is bound to the index digest, not the children.)
          cosign sign --recursive "${FAT_IMAGE}@${FAT_DIGEST}"
          cosign sign --recursive "${SLIM_IMAGE}@${SLIM_DIGEST}"

      - name: Generate SBOM — fat image
        uses: anchore/sbom-action@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8
        with:
          image: ${{ env.FAT_IMAGE }}@${{ env.FAT_DIGEST }}
          format: spdx-json
          output-file: sbom-fat.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate SBOM — slim image
        uses: anchore/sbom-action@55dc4ee22412511ee8c3142cbea40418e6cec693 # v0.17.8
        with:
          image: ${{ env.SLIM_IMAGE }}@${{ env.SLIM_DIGEST }}
          format: spdx-json
          output-file: sbom-slim.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest the SBOMs to the manifest-list digests (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          # The attestation is bound to the manifest-list (index) digest ONLY — `cosign
          # verify-attestation` must target the multi-arch digest the release reports, not a per-arch
          # child digest (children carry signatures, not attestations; see the sign step above).
          # `cosign attest` once accepted a --recursive flag, but it was parsed and never wired —
          # upstream removed it as unused in cosign v2.5.1 (sigstore/cosign#4187), and the published
          # v0.2.2 images confirm per-arch digests have no attestation. The SBOM is scanned on the
          # amd64 runner; the OS/package inventory is arch-identical (same Dockerfile + multi-arch
          # base), so it represents both arches — only the per-arch jitgen binary hash is not
          # separately attested.
          #
          # --tlog-upload=false: the fat image's SBOM (all four toolchains) is multi-MB and exceeds the
          # public Rekor transparency-log entry the DSSE/intoto upload tries to write, so the upload times
          # out. (Not to be confused with attest's `--no-upload`, which skips uploading entirely and
          # prints the envelope to stdout.) The attestation is a real DSSE envelope signed by the
          # ephemeral Fulcio cert and stored alongside the image in GHCR, bound to the digest. It is
          # NOT in the public transparency log.
          #
          # --timestamp-server-url: a Fulcio cert is short-lived (~10 min), so without a trusted timestamp
          # `verify-attestation` cannot prove the cert was valid at signing time once it expires — it fails
          # with "expected a signed timestamp to verify an expired certificate" (the tlog SignedEntryTimestamp
          # is what normally provides that, but the SBOM is not in the tlog). We instead request an RFC3161
          # timestamp from the Sigstore public-good TSA; it is tiny (just a signed hash + time) regardless of
          # SBOM size, and its TSA cert ships in cosign's default trusted root — but cosign only checks
          # RFC3161 timestamps when the verifier passes --use-signed-timestamps. The image SIGNATURES
          # (above) DO go to the tlog (small entries), so normal `cosign verify` is unaffected; only
          # `verify-attestation` needs --insecure-ignore-tlog --use-signed-timestamps (the TSA timestamp,
          # not a tlog entry, anchors the signing time). All documented in docs/ci.md.
          TSA=https://timestamp.sigstore.dev/api/v1/timestamp
          cosign attest --tlog-upload=false --timestamp-server-url "$TSA" --predicate sbom-fat.spdx.json  --type spdxjson "${FAT_IMAGE}@${FAT_DIGEST}"
          cosign attest --tlog-upload=false --timestamp-server-url "$TSA" --predicate sbom-slim.spdx.json --type spdxjson "${SLIM_IMAGE}@${SLIM_DIGEST}"

  # Publish the GitHub Release. `needs:` the binary builds AND the image publish, so this runs only when
  # every binary smoke passed AND both multi-arch images were built, smoked, pushed, signed, and SBOM'd
  # — i.e. the release is always gated on the full smoke + publish chain.
  release:
    name: publish release
    needs: [build-binaries, build-images, publish-images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: jitgen-*
          path: dist
          merge-multiple: true
      - name: Create GitHub Release with binaries + checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            dist/*.tar.gz dist/*.tar.gz.sha256
