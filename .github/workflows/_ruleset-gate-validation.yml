name: ruleset-gate-validation (throwaway)
on: workflow_dispatch
permissions:
  contents: read
jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # intentionally UNPINNED (tag, not SHA) — must trip zizmor unpinned-uses
