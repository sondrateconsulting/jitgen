# Static security audit of jitgen's own GitHub Actions workflows with zizmor (https://zizmor.sh), via
# the official zizmor-action (https://docs.zizmor.sh/integrations/#github-actions).
#
# Primary purpose: enforce that every `uses:` action is pinned to a full commit SHA (policy in
# .github/zizmor.yml, auto-discovered). zizmor also flags template injection, excessive permissions,
# cache poisoning, dangerous triggers, and known-vulnerable actions.
#
# `advanced-security: true`: the repo is PUBLIC, so GitHub code scanning is available for free. zizmor
# uploads its findings as SARIF (Security tab + inline PR annotations) and — by the action's design —
# exits 0 even on findings (Advanced Security fails a run only on internal errors). The blocking gate
# therefore lives in code-scanning MERGE PROTECTION (a repository ruleset that requires the `zizmor`
# tool to be alert-free before merge), NOT in this job's exit code. Verify it with:
#   gh api repos/sondrateconsulting/jitgen/rulesets --jq '.[]|select(.name=="zizmor pin enforcement")'
# Caveat: code-scanning protection blocks a PR only when a finding lands on a line the PR changes — which
# is exactly the primary threat here, a PR that adds or edits an unpinned `uses:`. The pin-enforcement
# policy itself is in .github/zizmor.yml (auto-discovered).
name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor (workflow audit + pin enforcement)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # zizmor's online audits resolve actions via the GitHub API
      security-events: write # upload the zizmor SARIF to code scanning (advanced-security: true)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: 1.25.2 # pin the zizmor CLI (the action defaults to "latest")
          # Upload SARIF to code scanning (which surfaces findings inline on the PR + in the Security
          # tab). `annotations` is mutually exclusive with this, so it is left at its default (off).
          advanced-security: true # public repo: upload SARIF to code scanning (the ruleset is the gate)

  # GP1 history-hygiene guard. The going-public history rewrite (GP1b) purged docs/reviews/** from all
  # history; this job keeps it purged and blocks any secret re-introduction. The gitleaks binary is
  # version-pinned + checksum-verified (no third-party action, no org license, no telemetry), and reads
  # the GP1a allowlist in .gitleaks.toml so jitgen's own redaction fixtures don't false-positive.
  history-hygiene:
    name: history hygiene (docs/reviews purged + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: docs/reviews must stay purged (GP1b)
        run: |
          matches="$(git ls-files -- docs/reviews/)"
          if [ -n "$matches" ]; then
            echo "::error::docs/reviews/ was purged from history in GP1b and must not be re-added."
            printf '%s\n' "$matches"
            exit 1
          fi
          echo "ok: docs/reviews/ is absent from the tree"
      - name: gitleaks secret scan (pinned 8.30.1, allowlist in .gitleaks.toml)
        run: |
          ver=8.30.1
          sha=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          tmp="$(mktemp -d)"
          curl -fsSL -o "$tmp/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz"
          echo "${sha}  $tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$tmp/gitleaks.tar.gz" -C "$tmp" gitleaks
          "$tmp/gitleaks" version
          "$tmp/gitleaks" dir . --config .gitleaks.toml --redact --no-banner
