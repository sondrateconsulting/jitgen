# Static security audit of jitgen's own GitHub Actions workflows with zizmor (https://zizmor.sh), via
# the official zizmor-action (https://docs.zizmor.sh/integrations/#github-actions).
#
# Primary purpose: enforce that every `uses:` action is pinned to a full commit SHA (policy in
# .github/zizmor.yml, auto-discovered). zizmor also flags template injection, excessive permissions,
# cache poisoning, dangerous triggers, and known-vulnerable actions.
#
# `advanced-security: false` because this repo is PRIVATE without GitHub Advanced Security: the default
# (SARIF upload to code scanning) would fail here AND always exit 0. With it off, the action runs zizmor
# in fail-on-findings mode, so an unpinned or unsafe action blocks the job, and findings surface as inline
# annotations. When the repo goes public (and code scanning is available), flip to `advanced-security: true`.
name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read # zizmor's online audits resolve actions via the API (needed for a private repo)

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor (workflow audit + pin enforcement)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: 1.25.2 # pin the zizmor CLI (the action defaults to "latest")
          advanced-security: false # private repo w/o GHAS: fail the job on findings instead of uploading SARIF
          annotations: true # surface findings as inline GitHub annotations
